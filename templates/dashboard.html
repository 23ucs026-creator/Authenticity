<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Documents</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h2 class="text-center mb-4">Uploaded Documents</h2>

<div class="container">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Filename</th>
                <th>Similarity</th>
                <th>AI Probability</th>
                <th>Text Length</th>
            </tr>
        </thead>
        <tbody>
            {% for d in documents %}
                <tr>
                    <td>{{ d.id }}</td>
                    <td>{{ d.filename }}</td>
                    <td>{{ d.max_similarity }}</td>
                    <td>{{ d.ai_generated_prob }}</td>
                    <td>{{ d.text_length }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
