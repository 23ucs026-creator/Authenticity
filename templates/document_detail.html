<!DOCTYPE html>
<html>
<head>
    <title>Document Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>{{ doc.filename }}</h3>

<p><b>Plagiarism Score:</b> {{ doc.plagiarism_score }}%</p>
<p><b>AI Probability:</b> {{ doc.ai_generated_prob }}%</p>

<h4 class="mt-4">Similarity Report</h4>

<table class="table table-bordered">

<tr>
<th>Document</th>
<th>Similarity</th>
</tr>

{% for r in report %}

<tr>
<td>{{ r.filename }}</td>
<td>{{ r.similarity }}%</td>
</tr>

{% endfor %}

</table>

<a href="/" class="btn btn-secondary">Back</a>

</body>
</html>
