<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Documents</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h2 class="text-center mb-4">Uploaded Documents</h2>

<div class="container">

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Filename</th>
                <th>Similarity</th>
                <th>AI Probability</th>
                <th>Text Length</th>
            </tr>
        </thead>

        <tbody>
        {% for doc in documents %}
            <tr>
                <td>{{ doc.id }}</td>
                <td>{{ doc.filename }}</td>
                <td>{{ doc.max_similarity }}</td>
                <td>{{ doc.ai_generated_prob }}</td>
                <td>{{ doc.text_length }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <p class="mt-4">
        <a class="btn btn-primary" href="/upload">Upload New Document</a>
    </p>

</div>

</body>
</html>
